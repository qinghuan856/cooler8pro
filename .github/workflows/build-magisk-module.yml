name: Build Magisk Module

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-magisk-module:
    name: Build Magisk Module
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install Android SDK packages
        shell: bash
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Make scripts executable
        shell: bash
        run: |
          chmod +x ./gradlew
          chmod +x ./scripts/package-magisk-module.sh

      - name: Build BLE service APK
        shell: bash
        run: |
          ./gradlew --no-daemon :magisk-ble-service:assembleRelease

      - name: Package Magisk module
        shell: bash
        run: |
          ./scripts/package-magisk-module.sh

      - name: Upload BLE service APK
        uses: actions/upload-artifact@v4
        with:
          name: MagcoolerBleService-release-apk
          path: magisk-ble-service/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Magisk module ZIP
        uses: actions/upload-artifact@v4
        with:
          name: BinghuanChargeCooler-magisk-module
          path: BinghuanChargeCooler.zip
          if-no-files-found: error
