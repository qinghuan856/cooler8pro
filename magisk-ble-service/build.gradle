plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.magcooler.magiskble'
    compileSdk 35

    defaultConfig {
        applicationId 'com.magcooler.magiskble'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    signingConfigs {
        release {
            initWith signingConfigs.debug
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}
